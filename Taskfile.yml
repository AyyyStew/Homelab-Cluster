version: "3"

vars:
  TALOS_DIR: ./talos/generated
  TERRAFORM_DIR: ./terraform

tasks:
  up:
    desc: Full cluster from scratch
    cmds:
      - task: tf-apply
      - task: wait-for-ips
      - task: wait-for-talos
      - task: gen-config
      - task: apply-config
      - task: wait-for-bootstrap
      - task: bootstrap
      - task: kubeconfig

  tf-apply:
    desc: Create VMs in Proxmox
    dir: "{{.TERRAFORM_DIR}}"
    cmds:
      - terraform apply -auto-approve

  wait-for-ips:
    desc: Wait until Terraform can see all VM IPs
    dir: "{{.TERRAFORM_DIR}}"
    cmds:
      - |
        echo "Waiting for VM IPs..."
        EXPECTED=$(terraform output -json worker_ips 2>/dev/null | jq 'length')
        while true; do
          terraform refresh -no-color > /dev/null 2>&1
          CP=$(terraform output -raw controlplane_ip 2>/dev/null)
          WORKERS=$(terraform output -json worker_ips 2>/dev/null | jq -r '.[]' | grep -v '^$' | wc -l)
          if [ -n "$CP" ] && [ "$WORKERS" -eq "$EXPECTED" ]; then
            echo "All IPs ready! CP: $CP"
            break
          fi
          echo "IPs not ready yet, waiting 10s..."
          sleep 10
        done

  wait-for-talos:
    desc: Wait until Talos maintenance API is reachable on all nodes
    dir: "{{.TERRAFORM_DIR}}"
    env:
      CP_IP:
        sh: terraform output -raw controlplane_ip
      WORKER_IPS:
        sh: terraform output -json worker_ips | jq -r '.[]'
    cmds:
      - |
        for IP in $CP_IP $WORKER_IPS; do
          echo "Waiting for Talos on $IP..."
          while ! nc -z $IP 50000 2>/dev/null; do
            echo "  $IP not ready, retrying in 5s..."
            sleep 5
          done
          echo "$IP ready"
        done

  gen-config:
    desc: Generate Talos config
    dir: "{{.TERRAFORM_DIR}}"
    env:
      CP_IP:
        sh: terraform output -raw controlplane_ip
    cmds:
      - mkdir -p ../talos/generated
      - |
        if [ -f ../talos/generated/talosconfig ]; then
          echo "Talos config already exists, skipping gen-config"
        else
          talosctl gen config my-cluster https://$CP_IP:6443 \
            --output-dir ../talos/generated \
            --config-patch @../talos/patches/installer.yaml \
            --force
        fi

  apply-config:
    desc: Push config to all nodes
    dir: "{{.TERRAFORM_DIR}}"
    env:
      CP_IP:
        sh: terraform output -raw controlplane_ip
      WORKER_IPS:
        sh: terraform output -json worker_ips | jq -r '.[]'
    cmds:
      - |
        bash << 'EOF'
        OUTPUT=$(talosctl apply-config --insecure --nodes $CP_IP --file ../talos/generated/controlplane.yaml 2>&1)
        echo "CP output: $OUTPUT"
        if echo "$OUTPUT" | grep -q "certificate required\|AlreadyExists"; then
          echo "$CP_IP already configured, skipping"
        else
          echo "$CP_IP configured successfully"
        fi

        for IP in $WORKER_IPS; do
          OUTPUT=$(talosctl apply-config --insecure --nodes $IP --file ../talos/generated/worker.yaml 2>&1)
          echo "Worker $IP output: $OUTPUT"
        if echo "$OUTPUT" | grep -q "certificate required\|AlreadyExists"; then
          echo "$IP already configured, skipping"
        else
          echo "$IP configured successfully"
        fi
        done
        EOF

  wait-for-bootstrap:
    desc: Wait until control plane Talos API is ready after install
    dir: "{{.TERRAFORM_DIR}}"
    env:
      CP_IP:
        sh: terraform output -raw controlplane_ip
    cmds:
      - |
        echo "Waiting for control plane to come back up..."
        while ! nc -z $CP_IP 50000 2>/dev/null; do
          echo "  $CP_IP not ready, retrying in 5s..."
          sleep 5
        done
        echo "Control plane ready for bootstrap"

  bootstrap:
    desc: Bootstrap the cluster
    dir: "{{.TERRAFORM_DIR}}"
    env:
      CP_IP:
        sh: terraform output -raw controlplane_ip
    cmds:
      - |
        if talosctl --talosconfig ../talos/generated/talosconfig --nodes $CP_IP services 2>/dev/null | grep "etcd" | grep -q "Running"; then
          echo "Cluster already bootstrapped, skipping"
        else
          OUTPUT=$(talosctl bootstrap --talosconfig ../talos/generated/talosconfig --endpoints $CP_IP --nodes $CP_IP 2>&1) || true
          if echo "$OUTPUT" | grep -q "AlreadyExists"; then
            echo "Cluster already bootstrapped, skipping"
          else
            echo "$OUTPUT"
          fi
        fi
        true

  kubeconfig:
    desc: Fetch kubeconfig
    dir: "{{.TERRAFORM_DIR}}"
    env:
      CP_IP:
        sh: terraform output -raw controlplane_ip
    cmds:
      - talosctl kubeconfig . --talosconfig ../{{.TALOS_DIR}}/talosconfig --endpoints $CP_IP --nodes $CP_IP
      - mkdir -p ~/.kube
      - cp ./kubeconfig ~/.kube/config

  destroy:
    desc: Tear everything down
    dir: "{{.TERRAFORM_DIR}}"
    cmds:
      - terraform destroy -auto-approve
