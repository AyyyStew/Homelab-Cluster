version: "3"

tasks:
  up:
    desc: Full cluster from scratch
    cmds:
      - task: tf-apply
      - task: bootstrap
      - task: k8s-install
      - task: seal-secrets
      - task: gitops-handoff

  tf-apply:
    desc: Create VMs in Proxmox
    dir: terraform
    cmds:
      - terraform apply -auto-approve

  bootstrap:
    desc: Bootstrap Talos cluster with Ansible
    cmds:
      - ansible-playbook -i ansible/inventory.py ansible/site.yaml

  k8s-install:
    desc: Install Sealed Secrets and ArgoCD
    cmds:
      - ./kubernetes/install.sh

  seal-secrets:
    desc: Seal secrets with cluster public key and commit
    cmds:
      - ./kubernetes/seal-secrets.sh
      - git add kubernetes/secrets/
      - git commit -m "reseal secrets for new cluster" || true
      - git push

  gitops-handoff:
    desc: Apply root ArgoCD app — hands cluster to GitOps
    cmds:
      - ./kubernetes/gitops-handoff.sh

  destroy:
    desc: Tear down Proxmox VMs
    dir: terraform
    cmds:
      - terraform destroy -auto-approve

  # Desktop Worker Commands
  setup-desktop:
    desc: One-time desktop host setup — installs KVM and configures bridge (requires sudo)
    cmds:
      - ansible-playbook ansible/setup-desktop-host.yaml --ask-become-pass

  desktop-up:
    desc: Provision desktop worker VM and join it to the cluster
    cmds:
      - task: desktop-tf-apply
      - ansible-playbook -i ansible/inventory.py ansible/desktop-join.yaml

  desktop-tf-apply:
    desc: Create desktop worker VM with Terraform
    dir: terraform-desktop
    cmds:
      - terraform init
      - terraform apply -auto-approve

  desktop-down:
    desc: Remove desktop worker from cluster and destroy VM
    cmds:
      - kubectl delete node talos-desktop --ignore-not-found
      - task: desktop-tf-destroy

  desktop-destroy:
    desc: Destroy desktop worker VM
    dir: terraform-desktop
    cmds:
      - terraform destroy -auto-approve
