version: "3"

tasks:
  up:
    desc: Full cluster from scratch
    cmds:
      - task: tf-apply
      - task: bootstrap

  tf-apply:
    desc: Create VMs in Proxmox
    dir: terraform
    cmds:
      - terraform apply -auto-approve

  bootstrap:
    desc: Bootstrap cluster with Ansible
    cmds:
      - ansible-playbook -i ansible/inventory.py ansible/site.yml

  destroy:
    desc: Tear everything down
    dir: terraform
    cmds:
      - terraform destroy -auto-approve
