controller:
  service:
    type: LoadBalancer
    loadBalancerIP: 192.168.0.210   # pin to first MetalLB IP so it's predictable
    annotations:
      metallb.universe.tf/address-pool: homelab-pool

  # Useful headers for apps behind the proxy
  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    use-proxy-protocol: "false"
