apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - clusterissuer.yaml
  - ../config

replacements:
  - source:
      kind: ConfigMap
      name: cluster-config
      fieldPath: data.letsencrypt_email
    targets:
      - select:
          kind: ClusterIssuer
          name: letsencrypt-prod
        fieldPaths:
          - spec.acme.email
